version: "3.1"

# ═══════════════════════════════════════════════════════════
#  BANKING AI CHATBOT — Module 1: NLU Test Cases
#  tests/test_nlu.yml — Expected intent & entity predictions
# ═══════════════════════════════════════════════════════════
#
#  Run with:  rasa test nlu --nlu data/nlu.yml
# ═══════════════════════════════════════════════════════════

nlu:

  # ── CHECK BALANCE ────────────────────────────────────────
  - text: "What is my savings account balance?"
    intent: check_balance
    entities:
      - start: 11
        end: 18
        value: "savings"
        entity: account_type

  - text: "Show me my current account balance"
    intent: check_balance
    entities:
      - value: "current"
        entity: account_type

  # ── LOAN INQUIRY ─────────────────────────────────────────
  - text: "What are the interest rates for personal loans?"
    intent: loan_inquiry
    entities:
      - value: "personal"
        entity: loan_type

  - text: "I want to apply for a home loan of 500000"
    intent: loan_inquiry
    entities:
      - value: "home"
        entity: loan_type
      - value: "500000"
        entity: amount

  # ── BLOCK CARD ───────────────────────────────────────────
  - text: "I lost my debit card, please block it"
    intent: block_card
    entities:
      - value: "debit"
        entity: card_type

  - text: "Block my credit card immediately"
    intent: block_card
    entities:
      - value: "credit"
        entity: card_type

  # ── FIND ATM ─────────────────────────────────────────────
  - text: "Where is the nearest ATM in Chennai?"
    intent: find_atm
    entities:
      - value: "Chennai"
        entity: location

  - text: "Find ATM near T Nagar"
    intent: find_atm
    entities:
      - value: "T Nagar"
        entity: location

  # ── FIND BRANCH ──────────────────────────────────────────
  - text: "Find a bank branch near Bangalore"
    intent: find_branch
    entities:
      - value: "Bangalore"
        entity: location

  # ── TRANSACTION STATUS ───────────────────────────────────
  - text: "Check my transaction from January 2024"
    intent: transaction_status
    entities:
      - value: "January 2024"
        entity: date

  - text: "Was my payment on 15th March successful?"
    intent: transaction_status
    entities:
      - value: "15th March"
        entity: date

  # ── MONEY TRANSFER ───────────────────────────────────────
  - text: "Transfer 5000 rupees to my friend"
    intent: transfer_money
    entities:
      - value: "5000"
        entity: amount

  - text: "Transfer 2500 from savings to current account"
    intent: transfer_money
    entities:
      - value: "2500"
        entity: amount
      - value: "savings"
        entity: account_type

  # ── MINI STATEMENT ───────────────────────────────────────
  - text: "Show me my mini statement for savings account"
    intent: mini_statement
    entities:
      - value: "savings"
        entity: account_type

  # ── OPEN ACCOUNT ─────────────────────────────────────────
  - text: "I want to open a savings account"
    intent: open_account
    entities:
      - value: "savings"
        entity: account_type

  # ── APPLY CREDIT CARD ────────────────────────────────────
  - text: "I want to apply for a credit card"
    intent: apply_credit_card
    entities:
      - value: "credit"
        entity: card_type

  # ── CHANGE PIN ───────────────────────────────────────────
  - text: "How do I reset my debit card PIN?"
    intent: change_pin
    entities:
      - value: "debit"
        entity: card_type

  # ── GREET / GOODBYE ──────────────────────────────────────
  - text: "Hi"
    intent: greet

  - text: "Goodbye, thanks for the help"
    intent: goodbye
