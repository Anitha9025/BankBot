    - action: utter_ask_loan_type
    - intent: inform_loan_type
      entities:
        - loan_type: "personal"
    - slot_was_set:
        - loan_type: "personal"
    - action: action_loan_inquiry

- story: loan inquiry - with amount
  steps:
    - intent: loan_inquiry
      entities:
        - loan_type: "car"
        - amount: 500000
    - slot_was_set:
        - loan_type: "car"
        - amount: 500000
    - action: action_loan_inquiry

# ── CARD BLOCKING FLOWS ──────────────────────────────────────────────

- story: block card - card type provided, confirmed
  steps:
    - intent: block_card
      entities:
        - card_type: "credit"
    - slot_was_set:
        - card_type: "credit"
