      entities:
        - card_type: "debit"
    - slot_was_set:
        - card_type: "debit"
    - action: utter_confirm_block_card
    - intent: affirm
    - action: action_block_card

- story: block card - user cancels
  steps:
    - intent: block_card
      entities:
        - card_type: "debit"
    - slot_was_set:
        - card_type: "debit"
    - action: utter_confirm_block_card
    - intent: deny
