# ── ATM & BRANCH LOCATOR FLOWS ───────────────────────────────────────

- story: find ATM - location provided
  steps:
    - intent: find_atm
      entities:
        - location: "Chennai"
    - slot_was_set:
        - location: "Chennai"
    - action: action_find_atm

- story: find ATM - location missing, bot asks
  steps:
    - intent: find_atm
    - action: utter_ask_location
    - intent: inform_location
      entities:
        - location: "Mumbai"
    - slot_was_set:
        - location: "Mumbai"
    - action: action_find_atm

- story: find branch - with follow-up ATM query
  steps:
    - intent: find_branch
      entities:
        - location: "Bangalore"
    - slot_was_set:
        - location: "Bangalore"
    - action: action_find_branch
    - intent: find_atm
    - action: action_find_atm

# ── TRANSACTION STATUS FLOWS ─────────────────────────────────────────

- story: transaction status - with date
  steps:
    - intent: transaction_status
      entities:
        - date: "15th March"
    - slot_was_set:
        - date: "15th March"
    - action: action_transaction_status

- story: transaction status - no date, bot asks
  steps:
    - intent: transaction_status
    - action: utter_ask_date
    - intent: inform_date
      entities:
        - date: "last week"
    - slot_was_set:
        - date: "last week"
    - action: action_transaction_status

# ── ESCALATION FLOWS ─────────────────────────────────────────────────

- story: user requests human agent
  steps:
    - intent: request_human_agent
    - action: action_escalate_to_human

- story: bot fails twice then escalates
  steps:
    - intent: out_of_scope
    - action: utter_default
    - intent: out_of_scope
    - action: action_escalate_to_human

# ── FULL SESSION ─────────────────────────────────────────────────────

- story: full banking session
  steps:
    - intent: greet
    - action: utter_greet
    - intent: check_balance
      entities:
        - account_type: "savings"
    - slot_was_set:
        - account_type: "savings"
    - action: utter_ask_account_number
    - intent: inform_account_number
    - slot_was_set:
        - account_number: "1234567890"
    - action: action_check_balance
    - intent: transfer_money
      entities:
        - amount: 3000
    - slot_was_set:
        - amount: 3000
    - action: utter_confirm_transfer
    - intent: affirm
    - action: action_transfer_money
    - intent: goodbye
    - action: utter_goodbye