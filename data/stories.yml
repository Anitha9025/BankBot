version: "3.1"

stories:

# ── CHECK BALANCE FLOWS (UPDATED — now includes account number step) ──

- story: check balance - account type and number provided upfront
  steps:
    - intent: greet
    - action: utter_greet
    - intent: check_balance
      entities:
        - account_type: "savings"
    - slot_was_set:
        - account_type: "savings"
    - action: utter_ask_account_number        # Bot asks for account number
    - intent: inform_account_number
    - slot_was_set:
        - account_number: "1234567890"
    - action: action_check_balance            # Now fetches balance

- story: check balance - account type missing then number asked
  steps:
    - intent: check_balance
    - action: utter_ask_account_type          # Bot asks account type
    - intent: inform_account_type
      entities:
        - account_type: "savings"
    - slot_was_set:
        - account_type: "savings"
    - action: utter_ask_account_number        # Bot asks account number
    - intent: inform_account_number
    - slot_was_set:
        - account_number: "9876543210"
    - action: action_check_balance

- story: check balance - current account with number
  steps:
    - intent: check_balance
      entities:
        - account_type: "current"
    - slot_was_set:
        - account_type: "current"
    - action: utter_ask_account_number
    - intent: inform_account_number
    - slot_was_set:
        - account_number: "1122334455"
    - action: action_check_balance

- story: check balance - follow up with mini statement
  steps:
    - intent: check_balance
      entities:
        - account_type: "savings"
    - slot_was_set:
        - account_type: "savings"
    - action: utter_ask_account_number
    - intent: inform_account_number
    - slot_was_set:
        - account_number: "1234567890"
    - action: action_check_balance
    - intent: mini_statement
    - action: action_mini_statement
    - intent: goodbye
    - action: utter_goodbye

# ── MONEY TRANSFER FLOWS ─────────────────────────────────────────────

- story: money transfer - all details provided
  steps:
    - intent: transfer_money
      entities:
        - amount: 5000
        - account_type: "savings"
    - slot_was_set:
        - amount: 5000
        - account_type: "savings"
    - action: action_transfer_money

- story: money transfer - amount missing, bot asks
  steps:
    - intent: transfer_money
    - action: utter_ask_amount
    - intent: inform_amount
      entities:
        - amount: 10000
    - slot_was_set:
        - amount: 10000
    - action: utter_ask_account_type
    - intent: inform_account_type
      entities:
        - account_type: "savings"
    - slot_was_set:
        - account_type: "savings"
    - action: action_transfer_money

- story: money transfer - user confirms
  steps:
    - intent: transfer_money
      entities:
        - amount: 2500
    - slot_was_set:
        - amount: 2500
    - action: utter_confirm_transfer
    - intent: affirm
    - action: action_transfer_money

- story: money transfer - user cancels
  steps:
    - intent: transfer_money
      entities:
        - amount: 2500
    - slot_was_set:
        - amount: 2500
    - action: utter_confirm_transfer
    - intent: deny
    - action: utter_transfer_cancelled

