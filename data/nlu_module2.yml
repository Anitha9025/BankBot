version: "3.1"

nlu:

# ── INFORM ACCOUNT TYPE ──────────────────────────────────────────────
- intent: inform_account_type
  examples: |
    - [savings](account_type)
    - [current](account_type)
    - [savings](account_type) account
    - [current](account_type) account
    - my [savings](account_type) account
    - my [current](account_type) account
    - use [savings](account_type)
    - use [current](account_type)
    - the [savings](account_type) one
    - the [current](account_type) one
    - I have a [savings](account_type) account
    - [saving](account_type) account
    - [saving](account_type)
    - [savings](account_type) please
    - [current](account_type) please
    - from [savings](account_type)
    - go with [savings](account_type)

- synonym: savings
  examples: |
    - saving
    - savngs
    - savings account
    - saving account
    - SB account
    - sb

- synonym: current
  examples: |
    - curren
    - currnt
    - current account
    - CA account
    - ca

# ── INFORM ACCOUNT NUMBER ────────────────────────────────────────────
# CRITICAL FIX: These examples must NOT use the (amount) entity tag.
# They use (account_number) tag so the model learns these long numbers
# are account numbers, NOT rupee amounts.
# Also includes strong keyword phrases like "account number is", "my number"
# so the model clearly distinguishes this intent from inform_amount.

- intent: inform_account_number
  examples: |
    - my account number is [1234567890](account_number)
    - account number [9876543210](account_number)
    - [1122334455](account_number) is my account number
    - it is [4455667788](account_number)
    - [0011223344](account_number)
    - [5566778899](account_number)
    - [6677889900](account_number)
    - [3344556677](account_number)
    - [2233445566](account_number)
    - [8899001122](account_number)
    - [2345678914](account_number)
    - [1987654321](account_number)
    - [3456789012](account_number)
    - [4567890123](account_number)
    - [5678901234](account_number)
    - [6789012345](account_number)
    - [7890123456](account_number)
    - [8901234567](account_number)
    - [9012345678](account_number)
    - [0123456789](account_number)
    - number is [1234567890](account_number)
    - the number is [9876543210](account_number)
    - my number is [1122334455](account_number)
    - [4455667788](account_number) please
    - here is my account number [5566778899](account_number)
    - acc no [6677889900](account_number)
    - account no [3344556677](account_number)

# ── INFORM AMOUNT ────────────────────────────────────────────────────
# CRITICAL FIX: Amount examples now use SMALL numbers with rupee keywords
# so the model learns amounts are SMALL numbers used in transfer context,
# NOT large 10-digit numbers like account numbers.

- intent: inform_amount
  examples: |
    - [500](amount) rupees
    - [1000](amount) rupees
    - [2500](amount) rupees
    - [5000](amount) rupees
    - [7500](amount) rupees
    - [10000](amount) rupees
    - [15000](amount) rupees
    - [20000](amount) rupees
    - [50000](amount) rupees
    - [100000](amount) rupees
    - Rs [500](amount)
    - Rs [5000](amount)
    - Rs [10000](amount)
    - Rs [25000](amount)
    - transfer [500](amount)
    - transfer [5000](amount)
    - transfer [10000](amount)
    - send [500](amount)
    - send [5000](amount)
    - send [10000](amount)
    - about [1000](amount)
    - just [2000](amount)
    - [5000](amount) only
    - [3000](amount) please

