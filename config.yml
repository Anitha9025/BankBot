version: "3.1"

recipe: default.v1
language: en

pipeline:
- name: WhitespaceTokenizer
- name: RegexFeaturizer
- name: LexicalSyntacticFeaturizer
- name: CountVectorsFeaturizer
  analyzer: word
- name: CountVectorsFeaturizer
  analyzer: char_wb
  min_ngram: 1
  max_ngram: 4
- name: DIETClassifier
  epochs: 100
  constrain_similarities: true
  model_confidence: softmax
  number_of_transformer_layers: 2
  transformer_size: 256
  entity_recognition: true
  BILOU_flag: true
  random_seed: 42
  ranking_length: 10
- name: EntitySynonymMapper
  # RegexEntityExtractor REMOVED — causes warning and conflicts with DIETClassifier
- name: FallbackClassifier
  threshold: 0.65            # Lowered from 0.70 — gives more tolerance for short replies
  ambiguity_threshold: 0.10

policies:
- name: RulePolicy    #AI follows rules
  core_fallback_threshold: 0.40
  core_fallback_action_name: "action_default_fallback"
  enable_fallback_prediction: true

- name: MemoizationPolicy   #AI remembers previous conversations  
  max_history: 8

- name: TEDPolicy   #AI generalises to new conversation paths
  max_history: 8
  epochs: 100
  constrain_similarities: true
  model_confidence: softmax
  ranking_length: 10

- name: UnexpecTEDIntentPolicy   #AI learns from unexpected conversations
  max_history: 8
  epochs: 100
assistant_id: 20260304-002229-wan-heather
