version: "3.1"

# ═══════════════════════════════════════════════════════════
#  BANKING AI CHATBOT — Module 1: Intent & Entity Recognition
#  rules.yml — Conversation rules (NLU-focused)
# ═══════════════════════════════════════════════════════════

rules:

  - rule: Greet user
    steps:
      - intent: greet
      - action: utter_greet

  - rule: Say goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: Handle balance check
    steps:
      - intent: check_balance
      - action: utter_check_balance

  - rule: Handle loan inquiry
    steps:
      - intent: loan_inquiry
      - action: utter_loan_inquiry

  - rule: Handle card block
    steps:
      - intent: block_card
      - action: utter_block_card

  - rule: Find ATM
    steps:
      - intent: find_atm
      - action: utter_find_atm

  - rule: Find Branch
    steps:
      - intent: find_branch
      - action: utter_find_branch

  - rule: Transaction status
    steps:
      - intent: transaction_status
      - action: utter_transaction_status

  - rule: Transfer money
    steps:
      - intent: transfer_money
      - action: utter_transfer_money

  - rule: Mini statement
    steps:
      - intent: mini_statement
      - action: utter_mini_statement

  - rule: Open account
    steps:
      - intent: open_account
      - action: utter_open_account

  - rule: Apply for credit card
    steps:
      - intent: apply_credit_card
      - action: utter_apply_credit_card

  - rule: Change PIN
    steps:
      - intent: change_pin
      - action: utter_change_pin

  - rule: Fallback
    steps:
      - intent: nlu_fallback
      - action: utter_default
